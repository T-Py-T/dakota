name: "Bug report"
description: "Something is broken. Let's fix it together."
title: "[Bug]: "
labels: ["kind/bug"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Let's squash it. 🐛
        Keep it short and reproducible. If you opt into **Raptor Current**, `actionadon` will route it through the structured queue. Otherwise it stays a normal issue.

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues first"
          required: true

  - type: markdown
    attributes:
      value: |
        If this is happening on a running Dakota system, you can attach a privacy-respecting diagnostics bundle by running:

        ```bash
        ujust report
        ```

        Paste the resulting gist URL below if you have one.

  - type: dropdown
    id: workflow-path
    attributes:
      label: "Workflow path"
      description: "Use the direct path by default. Pick Raptor Current only if you want the structured queue."
      options:
        - "Direct issue (skip workflow)"
        - "Raptor Current (structured + wrangler + agent queue)"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "What did you see? What did you expect to see?"
      placeholder: |
        Running `just validate` locally checks a different graph than CI unless I remember the exact BST_FLAGS incantation.
        Expected: local validation should match CI by default.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
      description: "Minimal steps to hit the bug. Include commands, environment, and any flags."
      placeholder: |
        1. `just validate`
        2. `just bst show --deps all oci/bluefin.bst`
        3. Compare local behavior with CI expectations
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Output of `bootc status` (if booted into dakota), OS, relevant tool versions."
    validations:
      required: false

  - type: input
    id: report-link
    attributes:
      label: "ujust report gist URL"
      description: "Optional. Paste the gist URL generated by `ujust report`."
      placeholder: "https://gist.github.com/..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      options:
        - "area/buildstream"
        - "area/gnome"
        - "area/brew"
        - "area/just"
        - "area/iso"
        - "area/dx"
        - "area/services"
        - "area/flatpak"
        - "area/nvidia"
        - "area/hardware"
        - "area/testing"
        - "area/upstream"
        - "area/policy"
        - "other"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### Acceptance criteria
        *Leave this blank unless you're preparing the issue for Raptor Current.*

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Optional. For Raptor Current only. Use markdown checklist items (`- [ ] ...`)."
      placeholder: |
        - [ ] `just validate` mirrors the CI validate job
        - [ ] `just bst show --deps all oci/bluefin.bst` uses the correct defaults without extra env vars
        - [ ] `just validate` passes after the fix
      render: markdown
    validations:
      required: false

  - type: textarea
    id: affected-elements
    attributes:
      label: "Extra context"
      description: "Optional. Add logs, related issues, upstream references, or affected files."
      placeholder: "Justfile, elements/oci/bluefin.bst"
    validations:
      required: false
