name: Sync main → testing

# After each squash-merge promotion (testing→main), the squash commit lands
# on main but not in testing, leaving testing BEHIND. This workflow merges
# main back into testing automatically so the next promotion PR is not blocked.
#
# Reusable logic lives in projectbluefin/actions. This is a thin caller.
# No GitHub App token needed — GITHUB_TOKEN can push to testing (same as the
# promote job in publish.yml which already fast-forwards testing directly).

on:
  push:
    branches:
      - main

concurrency:
  group: sync-main-to-testing
  cancel-in-progress: false

jobs:
  sync:
    name: Keep testing up-to-date with main
    uses: projectbluefin/actions/.github/workflows/reusable-sync-branches.yml@v1
    permissions:
      contents: write

  cleanup-squash-branch:
    name: Delete squash promotion branch
    needs: [sync]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Delete auto/promote-testing-to-main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Guard: do not delete the squash branch while a promotion PR is open.
          # Every push to main triggers this workflow — including normal PR merges.
          # Deleting the branch with an open PR leaves the PR pointing at a ghost
          # ref, causing permanent UNKNOWN mergeability that requires manual recovery.
          OPEN=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head auto/promote-testing-to-main \
            --state open \
            --json number \
            --jq 'length')
          if [[ "$OPEN" -gt 0 ]]; then
            echo "Open promotion PR exists — skipping branch deletion"
            exit 0
          fi
          gh api repos/${{ github.repository }}/git/refs/heads/auto/promote-testing-to-main \
            -X DELETE 2>/dev/null \
            && echo "✅ Deleted squash promotion branch" \
            || echo "Branch already deleted or does not exist — nothing to do"
